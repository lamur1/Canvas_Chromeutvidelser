<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px 0;
      color: #333;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0460a7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #034d8a; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      min-height: 18px;
    }
    .ok { color: green; }
    .feil { color: red; }
  </style>
</head>
<body>
  <h2>Canvas Speed Grader</h2>
  <button id="kjor">Fyll tomme felt og godkjenn</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
