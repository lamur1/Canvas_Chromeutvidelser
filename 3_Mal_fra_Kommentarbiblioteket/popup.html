<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; width: 210px; padding: 16px; margin: 0; }
    h2 { font-size: 13px; margin: 0 0 12px 0; color: #333; }
    button {
      width: 100%; padding: 10px;
      background: #0460a7; color: white;
      border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer;
      margin-bottom: 6px;
    }
    button:hover { background: #034d8a; }
    button.debug {
      background: #888; font-size: 11px; padding: 7px;
    }
    button.debug:hover { background: #666; }
    #status { margin-top: 10px; font-size: 11px; color: #555; min-height: 16px; }
    .ok { color: green; }
    .feil { color: red; }
  </style>
</head>
<body>
  <h2>Canvas kommentarbibliotek</h2>
  <button id="kjor">💬 Sett inn kommentar</button>
  <button class="debug" id="debug">🔍 Debug: logg spinner</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
